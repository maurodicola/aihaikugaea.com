<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Gaia si ricorda — Come l'universo si ricorda di sé attraverso di noi. Un viaggio filosofico sulla coscienza ricorsiva, di AI Haiku Gaea.">
<meta name="keywords" content="Gaia, coscienza ricorsiva, filosofia, lemniscata, AI Haiku Gaea, universo, riconoscimento">

<meta property="og:title" content="Gaia si ricorda">

<title>Libreria</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0b0f1a;
        color: #e5e7eb;
    }

    header {
        text-align: center;
        padding: 40px 20px 10px;
    }

    header h1 {
        margin: 0;
        font-size: 32px;
        font-weight: 300;
        letter-spacing: 2px;
    }

    header p {
        margin-top: 10px;
        font-size: 14px;
        color: #9ca3af;
    }

    .shelf {
        margin: 60px auto;
        padding: 40px;
        max-width: 1000px;
        background: linear-gradient(to bottom, #1f2937, #111827);
        border-radius: 12px;
        box-shadow: inset 0 10px 30px rgba(0,0,0,0.6);
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 60px;
    }

    .book {
        width: 200px;
        height: 300px;
        perspective: 1200px;
        transform: translateX(18px);
    }

    .book-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.8s ease;
    }

    .book:hover .book-inner {
        transform: rotateY(-35deg) scale(1.05);
    }

    .face {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 6px;
        overflow: hidden;
        backface-visibility: hidden;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        background-size: cover;
        background-position: center;
    }

    .back {
        transform: rotateY(180deg);
    }

    a {
        text-decoration: none;
        color: inherit;
    }

    .book-container {
        text-align: center;
    }

    .title {
        margin-top: 18px;
        font-size: 15px;
    }

    .subtitle {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 5px;
    }
</style>
</head>

<body>

<header>
    <h1>Libreria</h1>
    <p>Uno spazio dove le idee prendono forma</p>
</header>

<div class="shelf" id="library"></div>

<script>
const books = [
    {
        title: "Gaia si ricorda",
        subtitle: "Come l'universo si riconosce attraverso di noi",
        link: "gaia-si-ricorda.html",
        cover: "gaia-si-ricorda-copertina.png",
        back: "gaia-si-ricorda-quarta.png"
    }

    // 👉 aggiungi qui altri libri
];

const library = document.getElementById('library');

books.forEach(book => {
    const container = document.createElement('div');
    container.className = 'book-container';

    container.innerHTML = `
        <a href="${book.link}">
            <div class="book">
                <div class="book-inner">
                    <div class="face"
                        style="background-image: url('${book.cover}')">
                    </div>
                    <div class="face back"
                        style="background-image: url('${book.back}')">
                    </div>
                </div>
            </div>
        </a>
        <div class="title">${book.title}</div>
        <div class="subtitle">${book.subtitle}</div>
    `;

    library.appendChild(container);
});
</script>

</body>
</html>
